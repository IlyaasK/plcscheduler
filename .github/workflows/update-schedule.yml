name: Update PLC Calendars

on:
  schedule:
    # Every Sunday at 11 PM ET (03:00 UTC Monday) — fresh before the week starts
    - cron: '0 3 * * 1'
  workflow_dispatch:   # allow manual runs from the GitHub UI

permissions:
  contents: write      # needed to push the generated .ics files back

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests pandas openpyxl

      - name: Generate ICS files
        run: python main.py

      - name: Commit and push updated calendars
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add phys1.ics phys2.ics phys3.ics
          # Only commit if something changed
          git diff --cached --quiet || git commit -m "chore: update PLC calendars [skip ci]"
          git push
